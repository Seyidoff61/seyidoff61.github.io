<!DOCTYPE html><html lang="az"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 8 Mart - Xüsusi Tebrik Yarat</title>
  <meta name="description" content="Sevdiyiniz qadına xüsusi 8 Mart hədiyyəsi yarat! Romantik mesaj, sürpriz çarx və WhatsApp ilə göndər.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Floating Flowers Background -->
  <div class="hearts-container"></div>

  <!-- Main Content -->
  <div class="main-container">

    <!-- Logo -->
    <div class="logo-section">
      <div class="march8-badge">
        <span class="march8-number">8</span>
        <span class="march8-mart">MART</span>
      </div>
      <h1 class="logo-title">Qadınlar Günü</h1>
      <p class="logo-subtitle">Sevdiyiniz qadına xüsusi təbrik yaradın 🌸</p>
    </div>

    <!-- Creator Form -->
    <div class="glass-card">
      <form id="creator-form">

        <!-- Girl's Name -->
        <div class="form-group">
          <label class="form-label" for="girl-name">
            <span class="label-icon">👩</span> Adı (ana, bacı, dost, sevgili)
          </label>
          <input type="text" id="girl-name" class="form-input" placeholder="Məsələn: Aysel" required="" maxlength="30">
        </div>

        <!-- Love Message -->
        <div class="form-group">
          <label class="form-label" for="love-message">
            <span class="label-icon">💌</span> Təbrik mesajın
          </label>
          <textarea id="love-message" class="form-textarea" placeholder="Ürəyindən keçənləri yaz..." required="" maxlength="500"></textarea>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label class="form-label" for="phone-number">
            <span class="label-icon">📱</span> WhatsApp nömrən
          </label>
          <div class="phone-input-wrapper">
            <span class="phone-prefix">+994</span>
            <input type="tel" id="phone-number" class="form-input" placeholder="50 123 45 67" required="" maxlength="15">
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary">
          ✨ Link Yarat
        </button>
      </form>

      <!-- Generated Link Result -->
      <div id="link-result" class="link-result">
        <div class="link-box">
          <p>🔗 Hazır link:</p>
          <div id="link-text" class="link-text"></div>
        </div>
        <button onclick="copyLink()" class="btn btn-gold">
          📋 Linki Kopyala
        </button>
        <div id="copy-feedback" class="copy-feedback">
          ✅ Link kopyalandı! Ona göndər 🌸
        </div>
      </div>

      <!-- Made by seyidoff -->
      <div class="made-by-footer">
        <div class="made-by-divider"></div>
        <a href="https://seyidoff.tech" target="_blank" rel="noopener noreferrer" class="made-by-link">
          <span class="made-by-text">made by <span class="made-by-brand">seyidoff</span></span>
        </a>
      </div>
    </div>

  </div>

  <script src="../GvfRSBg0866F.com/ajax/libs/lz-string/Gqko6Ifz1DnA.0/wKkc6k34xmXH.js"></script>
  <script src="script.js"></script>


</body></html>
